# Profile CI — build and test an entire team domain.
#
# Complements affected.yml (PR-triggered, minimal checkout).
# This workflow answers: "does everything in my team's profile still pass?"
#
# Two triggers:
#   workflow_dispatch  — developer or on-call runs a specific profile on demand
#   schedule           — nightly sweep of ALL profiles (full integration gate)
#
# Sparse checkout strategy:
#   Phase 1  actions/checkout with blobless clone + initial cone that
#            includes common/profiles/ so profile JSON files are available
#            before the sparse-checkout expansion step.
#   Phase 2  Read includeFolders from common/profiles/<name>.json with jq
#            and pass the list directly to git sparse-checkout set.
#
# Profiles live at common/profiles/<name>.json.
name: Profile CI

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Team profile to build and test"
        required: true
        default: backend
        type: choice
        options: [backend, frontend, ml, infra, jvm]

  schedule:
    # Nightly Mon–Fri at 02:00 UTC — all profiles in parallel.
    - cron: "0 2 * * 1-5"

jobs:
  profile:
    runs-on: ubuntu-latest
    # workflow_dispatch → single chosen profile; schedule → all profiles.
    strategy:
      fail-fast: false
      matrix:
        profile: ${{ github.event_name == 'schedule'
          && fromJson('["backend","frontend","ml","infra","jvm"]')
          || fromJson(format('["{0}"]', inputs.profile)) }}
    name: "${{ matrix.profile }}"

    steps:
      # ── Phase 1: blobless clone — minimal cone ────────────────────────────────
      # Include common/profiles/ so the profile JSON is on disk before
      # the sparse-checkout expansion step runs.
      # build_defs/ contains .bzl files that BUCK packages load (ts_project, py_quality).
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: blob:none
          sparse-checkout: |
            common/profiles
            scripts
            .github
            toolchains
            build_defs
          sparse-checkout-cone-mode: true

      # ── Phase 2: expand cone via profile JSON ────────────────────────────────
      # Read includeFolders from the profile JSON (jq is pre-installed on
      # ubuntu-latest) and pass the list to git sparse-checkout set.
      - name: Checkout profile
        run: |
          PROFILE_DIRS=$(jq -r '.includeFolders[]' \
            "common/profiles/${{ matrix.profile }}.json")
          git sparse-checkout set \
            common/profiles scripts .github toolchains build_defs \
            $PROFILE_DIRS
          echo "── Sparse cone after profile checkout ──"
          git sparse-checkout list

      # ── Install Buck2 ─────────────────────────────────────────────────────────
      - name: Install Buck2
        run: |
          curl -fsSL \
            https://github.com/facebook/buck2/releases/download/latest/buck2-x86_64-unknown-linux-musl.zst \
            -o buck2.zst
          zstd -d buck2.zst && chmod +x buck2 && sudo mv buck2 /usr/local/bin/
          buck2 --version

      # ── Detect required toolchains ────────────────────────────────────────────
      # Use recursive find within each profile dir so that nested package
      # manifests (e.g. domains/api/python/requirements.txt) are detected even
      # when only the parent dir (domains/api) is listed in includeFolders.
      - name: Detect toolchains
        id: toolchains
        run: |
          NEEDS_NODE=false
          NEEDS_PYTHON=false
          DIRS=$(jq -r '.includeFolders[]' \
            "common/profiles/${{ matrix.profile }}.json")
          while IFS= read -r d; do
            find "$d" -name "package.json" \
              -not -path "*/node_modules/*" -maxdepth 4 -print -quit \
              | grep -q . && NEEDS_NODE=true
            find "$d" \( -name "requirements.txt" -o -name "pyproject.toml" \) \
              -maxdepth 4 -print -quit \
              | grep -q . && NEEDS_PYTHON=true
          done <<< "$DIRS"
          echo "needs_node=$NEEDS_NODE"     >> $GITHUB_OUTPUT
          echo "needs_python=$NEEDS_PYTHON" >> $GITHUB_OUTPUT
          echo "Node: $NEEDS_NODE  Python: $NEEDS_PYTHON"
          # Surface dirs as a space-separated output for the build/test steps
          DIRS_SPACE=$(echo "$DIRS" | tr '\n' ' ' | xargs)
          echo "dirs=$DIRS_SPACE" >> $GITHUB_OUTPUT

      # ── Toolchain setup ───────────────────────────────────────────────────────
      - uses: pnpm/action-setup@v4
        if: steps.toolchains.outputs.needs_node == 'true'
      - uses: actions/setup-node@v4
        if: steps.toolchains.outputs.needs_node == 'true'
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install JS dependencies
        if: steps.toolchains.outputs.needs_node == 'true'
        run: pnpm install --frozen-lockfile

      - uses: actions/setup-python@v5
        if: steps.toolchains.outputs.needs_python == 'true'
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: domains/api/python/requirements-dev.txt
      - name: Install Python dependencies
        if: steps.toolchains.outputs.needs_python == 'true'
        run: pip install -q -r domains/api/python/requirements-dev.txt

      # ── Restart Buck2 daemon with updated PATH ───────────────────────────────
      # The daemon starts during the first buck2 call (--version above).  It
      # captures the environment at that point — before setup-node/setup-python
      # add their bin dirs to PATH.  Genrules inherit the daemon's environment,
      # so without a restart they would use system Node/Python instead of the
      # managed versions.  kill + next invocation starts a fresh daemon.
      - name: Restart Buck2 daemon with updated PATH
        run: buck2 kill || true

      # ── Build all targets in the profile ─────────────────────────────────────
      # buck2 build //dir/... builds all genrule targets, which includes
      # quality targets (lint, fmt, typecheck, sast) since they are genrules.
      - name: Build (includes quality checks)
        run: |
          TARGETS=$(for d in ${{ steps.toolchains.outputs.dirs }}; do
            # Skip meta-dirs that have no BUCK files (scripts, .github, toolchains)
            [[ -f "$d/BUCK" ]] && echo "//$d/..."
          done | tr '\n' ' ')
          if [[ -z "$TARGETS" ]]; then
            echo "No Buck targets found in profile dirs — skipping."
            exit 0
          fi
          echo "Buck2 build: $TARGETS"
          buck2 build $TARGETS

      # ── Run all tests in the profile ──────────────────────────────────────────
      - name: Test
        run: |
          TARGETS=$(for d in ${{ steps.toolchains.outputs.dirs }}; do
            [[ -f "$d/BUCK" ]] && echo "//$d/..."
          done | tr '\n' ' ')
          if [[ -z "$TARGETS" ]]; then
            echo "No Buck targets found — skipping."
            exit 0
          fi
          echo "Buck2 test: $TARGETS"
          buck2 test $TARGETS
