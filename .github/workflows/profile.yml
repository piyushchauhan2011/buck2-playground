# Profile CI — build and test an entire team domain.
#
# Same structure as affected.yml: compute → build_* | test_* | quality_* (parallel) → gate
# Uses profile_targets.sh; calls affected-job.yml. Matrix: one pipeline per profile.
#
# Triggers: workflow_dispatch (on-demand) + schedule (nightly)
# Profiles: common/profiles/<name>.json
name: Profile CI

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Team profile to build and test"
        required: true
        default: backend
        type: choice
        options: [backend, frontend, ml, infra, jvm]

  schedule:
    - cron: "0 2 * * 1-5"

jobs:
  compute:
    name: compute (${{ matrix.profile }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: ${{ github.event_name == 'schedule'
          && fromJson('["backend","frontend","ml","infra","jvm"]')
          || fromJson(format('["{0}"]', github.event.inputs.profile)) }}
    outputs:
      sparse_dirs: ${{ steps.targets.outputs.sparse_dirs }}
      build_node: ${{ steps.targets.outputs.build_node }}
      build_python: ${{ steps.targets.outputs.build_python }}
      build_php: ${{ steps.targets.outputs.build_php }}
      build_other: ${{ steps.targets.outputs.build_other }}
      test_node: ${{ steps.targets.outputs.test_node }}
      test_python: ${{ steps.targets.outputs.test_python }}
      test_php: ${{ steps.targets.outputs.test_php }}
      test_other: ${{ steps.targets.outputs.test_other }}
      quality_node: ${{ steps.targets.outputs.quality_node }}
      quality_python: ${{ steps.targets.outputs.quality_python }}
      quality_php: ${{ steps.targets.outputs.quality_php }}
      quality_other: ${{ steps.targets.outputs.quality_other }}
      needs_node: ${{ steps.targets.outputs.needs_node }}
      needs_python: ${{ steps.targets.outputs.needs_python }}
      needs_php: ${{ steps.targets.outputs.needs_php }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: blob:none
          sparse-checkout: |
            common/profiles
            scripts
            .github
            toolchains
            build_defs
            third_party
            libs/monorepo-tooling
          sparse-checkout-cone-mode: true

      - name: Checkout profile
        run: |
          PROFILE_DIRS=$(jq -r '.includeFolders[]' "common/profiles/${{ matrix.profile }}.json")
          git sparse-checkout set \
            common/profiles scripts .github toolchains build_defs third_party \
            $PROFILE_DIRS

      - name: Install Buck2
        run: |
          curl -fsSL \
            https://github.com/facebook/buck2/releases/download/latest/buck2-x86_64-unknown-linux-musl.zst \
            -o buck2.zst
          zstd -d buck2.zst && chmod +x buck2 && sudo mv buck2 /usr/local/bin/
          buck2 --version

      - name: Materialise BUCK files and monorepo-tooling
        run: |
          git ls-tree -r --name-only HEAD \
            | grep -E '(^|/)BUCK$|\.bzl$|\.sh$|(^|/)package\.json$|pnpm-workspace\.yaml$|pnpm-lock\.yaml$|tsconfig\.build\.json$|tsconfig\.json$|eslint\.config\.(js|mjs|cjs)$|(^|/)composer\.(json|lock)$|^libs/monorepo-tooling/.*\.ts$' \
            | while IFS= read -r f; do
                mkdir -p "$(dirname "$f")"
                git cat-file blob "HEAD:$f" > "$f"
                if [[ "$f" == *.sh ]]; then chmod +x "$f"; fi
              done

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install and build monorepo-tooling
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @repo/monorepo-tooling build

      - name: Compute profile targets
        id: targets
        run: |
          eval "$(node libs/monorepo-tooling/dist/cli.js profile-targets ${{ matrix.profile }})"
          SPARSE_DIRS="common/profiles build_defs third_party $(jq -r '.includeFolders[]' common/profiles/${{ matrix.profile }}.json | tr '\n' ' ' | xargs)"
          echo "sparse_dirs=$SPARSE_DIRS" >> $GITHUB_OUTPUT
          echo "build_node=$BUILD_NODE" >> $GITHUB_OUTPUT
          echo "build_python=$BUILD_PYTHON" >> $GITHUB_OUTPUT
          echo "build_php=$BUILD_PHP" >> $GITHUB_OUTPUT
          echo "build_other=$BUILD_OTHER" >> $GITHUB_OUTPUT
          echo "test_node=$TEST_NODE" >> $GITHUB_OUTPUT
          echo "test_python=$TEST_PYTHON" >> $GITHUB_OUTPUT
          echo "test_php=$TEST_PHP" >> $GITHUB_OUTPUT
          echo "test_other=$TEST_OTHER" >> $GITHUB_OUTPUT
          echo "quality_node=$QUALITY_NODE" >> $GITHUB_OUTPUT
          echo "quality_python=$QUALITY_PYTHON" >> $GITHUB_OUTPUT
          echo "quality_php=$QUALITY_PHP" >> $GITHUB_OUTPUT
          echo "quality_other=$QUALITY_OTHER" >> $GITHUB_OUTPUT
          echo "needs_node=$NEEDS_NODE" >> $GITHUB_OUTPUT
          echo "needs_python=$NEEDS_PYTHON" >> $GITHUB_OUTPUT
          echo "needs_php=$NEEDS_PHP" >> $GITHUB_OUTPUT

  build_node:
    uses: ./.github/workflows/affected-job.yml
    needs: compute
    if: needs.compute.result == 'success' && needs.compute.outputs.build_node != ''
    strategy:
      fail-fast: false
      matrix:
        profile: ${{ github.event_name == 'schedule'
          && fromJson('["backend","frontend","ml","infra","jvm"]')
          || fromJson(format('["{0}"]', github.event.inputs.profile)) }}
    with:
      job_name: ${{ matrix.profile }} build (node)
      job_type: build
      language: node
      sparse_dirs: ${{ needs.compute.outputs.sparse_dirs }}
      targets: ${{ needs.compute.outputs.build_node }}
      needs_node: ${{ needs.compute.outputs.needs_node }}
      needs_python: ${{ needs.compute.outputs.needs_python }}
      needs_php: ${{ needs.compute.outputs.needs_php }}

  build_python:
    uses: ./.github/workflows/affected-job.yml
    needs: compute
    if: needs.compute.result == 'success' && needs.compute.outputs.build_python != ''
    strategy:
      fail-fast: false
      matrix:
        profile: ${{ github.event_name == 'schedule'
          && fromJson('["backend","frontend","ml","infra","jvm"]')
          || fromJson(format('["{0}"]', github.event.inputs.profile)) }}
    with:
      job_name: ${{ matrix.profile }} build (python)
      job_type: build
      language: python
      sparse_dirs: ${{ needs.compute.outputs.sparse_dirs }}
      targets: ${{ needs.compute.outputs.build_python }}
      needs_node: ${{ needs.compute.outputs.needs_node }}
      needs_python: ${{ needs.compute.outputs.needs_python }}
      needs_php: ${{ needs.compute.outputs.needs_php }}

  build_other:
    uses: ./.github/workflows/affected-job.yml
    needs: compute
    if: needs.compute.result == 'success' && needs.compute.outputs.build_other != ''
    strategy:
      fail-fast: false
      matrix:
        profile: ${{ github.event_name == 'schedule'
          && fromJson('["backend","frontend","ml","infra","jvm"]')
          || fromJson(format('["{0}"]', github.event.inputs.profile)) }}
    with:
      job_name: ${{ matrix.profile }} build (other)
      job_type: build
      language: other
      sparse_dirs: ${{ needs.compute.outputs.sparse_dirs }}
      targets: ${{ needs.compute.outputs.build_other }}
      needs_node: ${{ needs.compute.outputs.needs_node }}
      needs_python: ${{ needs.compute.outputs.needs_python }}
      needs_php: ${{ needs.compute.outputs.needs_php }}

  build_php:
    uses: ./.github/workflows/affected-job.yml
    needs: compute
    if: needs.compute.result == 'success' && needs.compute.outputs.build_php != ''
    strategy:
      fail-fast: false
      matrix:
        profile: ${{ github.event_name == 'schedule'
          && fromJson('["backend","frontend","ml","infra","jvm"]')
          || fromJson(format('["{0}"]', github.event.inputs.profile)) }}
    with:
      job_name: ${{ matrix.profile }} build (php)
      job_type: build
      language: php
      sparse_dirs: ${{ needs.compute.outputs.sparse_dirs }}
      targets: ${{ needs.compute.outputs.build_php }}
      needs_node: ${{ needs.compute.outputs.needs_node }}
      needs_python: ${{ needs.compute.outputs.needs_python }}
      needs_php: ${{ needs.compute.outputs.needs_php }}

  test_node:
    uses: ./.github/workflows/affected-job.yml
    needs: compute
    if: needs.compute.result == 'success' && needs.compute.outputs.test_node != ''
    strategy:
      fail-fast: false
      matrix:
        profile: ${{ github.event_name == 'schedule'
          && fromJson('["backend","frontend","ml","infra","jvm"]')
          || fromJson(format('["{0}"]', github.event.inputs.profile)) }}
    with:
      job_name: ${{ matrix.profile }} test (node)
      job_type: test
      language: node
      sparse_dirs: ${{ needs.compute.outputs.sparse_dirs }}
      targets: ${{ needs.compute.outputs.test_node }}
      needs_node: ${{ needs.compute.outputs.needs_node }}
      needs_python: ${{ needs.compute.outputs.needs_python }}
      needs_php: ${{ needs.compute.outputs.needs_php }}

  test_python:
    uses: ./.github/workflows/affected-job.yml
    needs: compute
    if: needs.compute.result == 'success' && needs.compute.outputs.test_python != ''
    strategy:
      fail-fast: false
      matrix:
        profile: ${{ github.event_name == 'schedule'
          && fromJson('["backend","frontend","ml","infra","jvm"]')
          || fromJson(format('["{0}"]', github.event.inputs.profile)) }}
    with:
      job_name: ${{ matrix.profile }} test (python)
      job_type: test
      language: python
      sparse_dirs: ${{ needs.compute.outputs.sparse_dirs }}
      targets: ${{ needs.compute.outputs.test_python }}
      needs_node: ${{ needs.compute.outputs.needs_node }}
      needs_python: ${{ needs.compute.outputs.needs_python }}
      needs_php: ${{ needs.compute.outputs.needs_php }}

  test_php:
    uses: ./.github/workflows/affected-job.yml
    needs: compute
    if: needs.compute.result == 'success' && needs.compute.outputs.test_php != ''
    strategy:
      fail-fast: false
      matrix:
        profile: ${{ github.event_name == 'schedule'
          && fromJson('["backend","frontend","ml","infra","jvm"]')
          || fromJson(format('["{0}"]', github.event.inputs.profile)) }}
    with:
      job_name: ${{ matrix.profile }} test (php)
      job_type: test
      language: php
      sparse_dirs: ${{ needs.compute.outputs.sparse_dirs }}
      targets: ${{ needs.compute.outputs.test_php }}
      needs_node: ${{ needs.compute.outputs.needs_node }}
      needs_python: ${{ needs.compute.outputs.needs_python }}
      needs_php: ${{ needs.compute.outputs.needs_php }}

  test_other:
    uses: ./.github/workflows/affected-job.yml
    needs: compute
    if: needs.compute.result == 'success' && needs.compute.outputs.test_other != ''
    strategy:
      fail-fast: false
      matrix:
        profile: ${{ github.event_name == 'schedule'
          && fromJson('["backend","frontend","ml","infra","jvm"]')
          || fromJson(format('["{0}"]', github.event.inputs.profile)) }}
    with:
      job_name: ${{ matrix.profile }} test (other)
      job_type: test
      language: other
      sparse_dirs: ${{ needs.compute.outputs.sparse_dirs }}
      targets: ${{ needs.compute.outputs.test_other }}
      needs_node: ${{ needs.compute.outputs.needs_node }}
      needs_python: ${{ needs.compute.outputs.needs_python }}
      needs_php: ${{ needs.compute.outputs.needs_php }}

  quality_node:
    uses: ./.github/workflows/affected-job.yml
    needs: compute
    if: needs.compute.result == 'success' && needs.compute.outputs.quality_node != ''
    strategy:
      fail-fast: false
      matrix:
        profile: ${{ github.event_name == 'schedule'
          && fromJson('["backend","frontend","ml","infra","jvm"]')
          || fromJson(format('["{0}"]', github.event.inputs.profile)) }}
    with:
      job_name: ${{ matrix.profile }} quality (node)
      job_type: quality
      language: node
      sparse_dirs: ${{ needs.compute.outputs.sparse_dirs }}
      targets: ${{ needs.compute.outputs.quality_node }}
      needs_node: ${{ needs.compute.outputs.needs_node }}
      needs_python: ${{ needs.compute.outputs.needs_python }}
      needs_php: ${{ needs.compute.outputs.needs_php }}

  quality_python:
    uses: ./.github/workflows/affected-job.yml
    needs: compute
    if: needs.compute.result == 'success' && needs.compute.outputs.quality_python != ''
    strategy:
      fail-fast: false
      matrix:
        profile: ${{ github.event_name == 'schedule'
          && fromJson('["backend","frontend","ml","infra","jvm"]')
          || fromJson(format('["{0}"]', github.event.inputs.profile)) }}
    with:
      job_name: ${{ matrix.profile }} quality (python)
      job_type: quality
      language: python
      sparse_dirs: ${{ needs.compute.outputs.sparse_dirs }}
      targets: ${{ needs.compute.outputs.quality_python }}
      needs_node: ${{ needs.compute.outputs.needs_node }}
      needs_python: ${{ needs.compute.outputs.needs_python }}
      needs_php: ${{ needs.compute.outputs.needs_php }}

  quality_php:
    uses: ./.github/workflows/affected-job.yml
    needs: compute
    if: needs.compute.result == 'success' && needs.compute.outputs.quality_php != ''
    strategy:
      fail-fast: false
      matrix:
        profile: ${{ github.event_name == 'schedule'
          && fromJson('["backend","frontend","ml","infra","jvm"]')
          || fromJson(format('["{0}"]', github.event.inputs.profile)) }}
    with:
      job_name: ${{ matrix.profile }} quality (php)
      job_type: quality
      language: php
      sparse_dirs: ${{ needs.compute.outputs.sparse_dirs }}
      targets: ${{ needs.compute.outputs.quality_php }}
      needs_node: ${{ needs.compute.outputs.needs_node }}
      needs_python: ${{ needs.compute.outputs.needs_python }}
      needs_php: ${{ needs.compute.outputs.needs_php }}

  quality_other:
    uses: ./.github/workflows/affected-job.yml
    needs: compute
    if: needs.compute.result == 'success' && needs.compute.outputs.quality_other != ''
    strategy:
      fail-fast: false
      matrix:
        profile: ${{ github.event_name == 'schedule'
          && fromJson('["backend","frontend","ml","infra","jvm"]')
          || fromJson(format('["{0}"]', github.event.inputs.profile)) }}
    with:
      job_name: ${{ matrix.profile }} quality (other)
      job_type: quality
      language: other
      sparse_dirs: ${{ needs.compute.outputs.sparse_dirs }}
      targets: ${{ needs.compute.outputs.quality_other }}
      needs_node: ${{ needs.compute.outputs.needs_node }}
      needs_python: ${{ needs.compute.outputs.needs_python }}
      needs_php: ${{ needs.compute.outputs.needs_php }}

  gate:
    name: gate (${{ matrix.profile }})
    runs-on: ubuntu-latest
    needs:
      - compute
      - build_node
      - build_python
      - build_php
      - build_other
      - test_node
      - test_python
      - test_php
      - test_other
      - quality_node
      - quality_python
      - quality_php
      - quality_other
    if: always()
    strategy:
      fail-fast: false
      matrix:
        profile: ${{ github.event_name == 'schedule'
          && fromJson('["backend","frontend","ml","infra","jvm"]')
          || fromJson(format('["{0}"]', github.event.inputs.profile)) }}
    steps:
      - name: Check all jobs passed or skipped
        run: |
          set -e
          if [ "${{ needs.compute.result }}" != "success" ]; then
            echo "::error::Compute job did not succeed (result: ${{ needs.compute.result }})"
            exit 1
          fi
          failed=""
          [ "${{ needs.build_node.result }}" = "failure" ]   && failed="${failed}build_node, " || true
          [ "${{ needs.build_python.result }}" = "failure" ]  && failed="${failed}build_python, " || true
          [ "${{ needs.build_php.result }}" = "failure" ]  && failed="${failed}build_php, " || true
          [ "${{ needs.build_other.result }}" = "failure" ]  && failed="${failed}build_other, " || true
          [ "${{ needs.test_node.result }}" = "failure" ]     && failed="${failed}test_node, " || true
          [ "${{ needs.test_python.result }}" = "failure" ]   && failed="${failed}test_python, " || true
          [ "${{ needs.test_php.result }}" = "failure" ]   && failed="${failed}test_php, " || true
          [ "${{ needs.test_other.result }}" = "failure" ]    && failed="${failed}test_other, " || true
          [ "${{ needs.quality_node.result }}" = "failure" ]  && failed="${failed}quality_node, " || true
          [ "${{ needs.quality_python.result }}" = "failure" ] && failed="${failed}quality_python, " || true
          [ "${{ needs.quality_php.result }}" = "failure" ] && failed="${failed}quality_php, " || true
          [ "${{ needs.quality_other.result }}" = "failure" ] && failed="${failed}quality_other, " || true
          if [ -n "$failed" ]; then
            echo "::error::Failed jobs: ${failed%, }"
            exit 1
          fi
          echo "All jobs passed or were skipped (as expected)"
