# PR: run only affected build, test, quality
name: Affected CI
on:
  pull_request:
    branches: [main, master]
jobs:
  affected:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
      - name: Install Buck2
        run: |
          set -euo pipefail
          ASSET_URL=""

          # Fast path: known latest-download names (musl first, then gnu fallback).
          for URL in \
            "https://github.com/facebook/buck2/releases/latest/download/buck2-x86_64-unknown-linux-musl.zst" \
            "https://github.com/facebook/buck2/releases/latest/download/buck2-x86_64-unknown-linux-gnu.zst"
          do
            if curl -fsSLI "$URL" >/dev/null; then
              ASSET_URL="$URL"
              break
            fi
          done

          # Fallback: query releases API and grep a matching linux x86_64 asset URL.
          if [ -z "$ASSET_URL" ]; then
            API_JSON="$(curl -sSL "https://api.github.com/repos/facebook/buck2/releases?per_page=10" || true)"
            ASSET_URL="$(
              printf '%s' "$API_JSON" | \
                rg -o 'https://[^"]*x86_64-unknown-linux-musl\.zst|https://[^"]*x86_64-unknown-linux-gnu\.zst' | \
                head -n1 || true
            )"
          fi

          if [ -z "$ASSET_URL" ]; then
            echo "Could not find Buck2 Linux x86_64 asset in latest release." >&2
            exit 1
          fi
          curl -fsSL "$ASSET_URL" -o buck2.zst
          zstd -d buck2.zst && chmod +x buck2 && sudo mv buck2 /usr/local/bin/
          buck2 --version
      - name: Compute affected targets
        id: affected
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          [ -z "$BASE" ] && BASE=HEAD~1
          eval "$(bash scripts/affected_targets.sh "$BASE" 2>/dev/null)"
          echo "build=$BUILD_TARGETS" >> $GITHUB_OUTPUT
          echo "test=$TEST_TARGETS" >> $GITHUB_OUTPUT
          echo "quality=$QUALITY_TARGETS" >> $GITHUB_OUTPUT
      - name: Build affected
        if: steps.affected.outputs.build != ''
        run: buck2 build ${{ steps.affected.outputs.build }}
      - name: Test affected
        if: steps.affected.outputs.test != ''
        run: buck2 test ${{ steps.affected.outputs.test }}
      - name: Quality checks
        if: steps.affected.outputs.quality != ''
        run: buck2 build ${{ steps.affected.outputs.quality }}
