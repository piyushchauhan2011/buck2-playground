# PR: run only affected build, test, quality
name: Affected CI
on:
  pull_request:
    branches: [main, master]
jobs:
  affected:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
      - name: Install Buck2
        run: |
          ASSET_URL=$(
            curl -fsSL https://api.github.com/repos/facebook/buck2/releases/latest | \
              python3 -c "import json,sys; a=json.load(sys.stdin)['assets']; names=[x['browser_download_url'] for x in a]; picks=[u for u in names if u.endswith('x86_64-unknown-linux-musl.zst')] or [u for u in names if u.endswith('x86_64-unknown-linux-gnu.zst')]; print(picks[0] if picks else '')"
          )
          if [ -z "$ASSET_URL" ]; then
            echo "Could not find Buck2 Linux x86_64 asset in latest release." >&2
            exit 1
          fi
          curl -fsSL "$ASSET_URL" -o buck2.zst
          zstd -d buck2.zst && chmod +x buck2 && sudo mv buck2 /usr/local/bin/
          buck2 --version
      - name: Compute affected targets
        id: affected
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          [ -z "$BASE" ] && BASE=HEAD~1
          eval "$(bash scripts/affected_targets.sh "$BASE" 2>/dev/null)"
          echo "build=$BUILD_TARGETS" >> $GITHUB_OUTPUT
          echo "test=$TEST_TARGETS" >> $GITHUB_OUTPUT
          echo "quality=$QUALITY_TARGETS" >> $GITHUB_OUTPUT
      - name: Build affected
        if: steps.affected.outputs.build != ''
        run: buck2 build ${{ steps.affected.outputs.build }}
      - name: Test affected
        if: steps.affected.outputs.test != ''
        run: buck2 test ${{ steps.affected.outputs.test }}
      - name: Quality checks
        if: steps.affected.outputs.quality != ''
        run: buck2 build ${{ steps.affected.outputs.quality }}
