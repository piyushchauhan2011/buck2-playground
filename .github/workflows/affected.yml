# Affected CI: build/test/quality for changed targets (blobless sparse checkout).
#
# Triggers: pull_request (main/master) + push (main/master, e.g. post-merge verification)
# Pipeline: compute → build_* | test_* | quality_* (parallel by language) → gate
#
# Checkout strategy:
#   Phase 1  blobless clone + sparse cone (scripts/ .github/ toolchains/ build_defs/ libs/monorepo-tooling/).
#            Then materialise ALL BUCK files — they are tiny config files,
#            not source code.  This gives buck2 a full view of the build
#            graph without downloading any language source blobs.
#   Phase 2  buck2 cquery rdeps(//..., ...) with the full graph to find
#            every package whose targets are transitively affected.
#            git sparse-checkout set expands the cone to those dirs only.
name: Affected CI
on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  compute:
    name: compute
    runs-on: ubuntu-latest
    outputs:
      sparse_dirs: ${{ steps.sparse.outputs.sparse_dirs }}
      build: ${{ steps.affected.outputs.build }}
      test: ${{ steps.affected.outputs.test }}
      quality: ${{ steps.affected.outputs.quality }}
      build_node: ${{ steps.affected.outputs.build_node }}
      build_python: ${{ steps.affected.outputs.build_python }}
      build_php: ${{ steps.affected.outputs.build_php }}
      build_other: ${{ steps.affected.outputs.build_other }}
      test_node: ${{ steps.affected.outputs.test_node }}
      test_python: ${{ steps.affected.outputs.test_python }}
      test_php: ${{ steps.affected.outputs.test_php }}
      test_other: ${{ steps.affected.outputs.test_other }}
      quality_node: ${{ steps.affected.outputs.quality_node }}
      quality_python: ${{ steps.affected.outputs.quality_python }}
      quality_php: ${{ steps.affected.outputs.quality_php }}
      quality_other: ${{ steps.affected.outputs.quality_other }}
      needs_node: ${{ steps.affected.outputs.needs_node }}
      needs_python: ${{ steps.affected.outputs.needs_python }}
      needs_php: ${{ steps.affected.outputs.needs_php }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: blob:none
          sparse-checkout: |
            scripts
            .github
            toolchains
            build_defs
            libs/monorepo-tooling
          sparse-checkout-cone-mode: true

      - name: Checkout BUCK files, sh_test scripts, package manifests, and monorepo-tooling
        run: |
          git ls-tree -r --name-only HEAD \
            | grep -E '(^|/)BUCK$|\.bzl$|\.sh$|(^|/)package\.json$|pnpm-workspace\.yaml$|pnpm-lock\.yaml$|tsconfig\.build\.json$|tsconfig\.json$|eslint\.config\.(js|mjs|cjs)$|(^|/)composer\.(json|lock)$|^libs/monorepo-tooling/.*\.ts$' \
            | while IFS= read -r f; do
                mkdir -p "$(dirname "$f")"
                git cat-file blob "HEAD:$f" > "$f"
                if [[ "$f" == *.sh ]]; then chmod +x "$f"; fi
              done
          echo "BUCK files    : $(find . -name BUCK          -not -path './.git/*' | wc -l)"
          echo "Starlark (.bzl): $(find . -name '*.bzl'       -not -path './.git/*' | wc -l)"
          echo "Shell scripts : $(find . -name '*.sh'        -not -path './.git/*' | wc -l)"
          echo "package.json  : $(find . -name 'package.json' -not -path './.git/*' -not -path '*/node_modules/*' | wc -l)"

      - name: Install Buck2
        run: |
          curl -fsSL \
            https://github.com/facebook/buck2/releases/download/latest/buck2-x86_64-unknown-linux-musl.zst \
            -o buck2.zst
          zstd -d buck2.zst && chmod +x buck2 && sudo mv buck2 /usr/local/bin/
          buck2 --version

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install and build monorepo-tooling
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @repo/monorepo-tooling build

      - name: Compute sparse dirs
        id: sparse
        run: |
          # PR: use merge-base of base and head; push: use HEAD~1
          if [ -n "${{ github.event.pull_request.base.sha }}" ] && [ -n "${{ github.event.pull_request.head.sha }}" ]; then
            BASE=$(git merge-base ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} 2>/dev/null || echo "${{ github.event.pull_request.base.sha }}")
            HEAD_REF=${{ github.event.pull_request.head.sha }}
          else
            BASE=HEAD~1
            HEAD_REF=HEAD
          fi
          echo "BASE ref: $BASE, HEAD ref: $HEAD_REF"
          eval "$(node libs/monorepo-tooling/dist/cli.js sparse-dirs "$BASE" "$HEAD_REF")"
          echo "Sparse dirs: ${SPARSE_DIRS:-<none>}"
          echo "sparse_dirs<<EOF" >> $GITHUB_OUTPUT
          echo -n "${SPARSE_DIRS:-}" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Expand sparse checkout
        if: steps.sparse.outputs.sparse_dirs != ''
        run: |
          echo "Checking out: ${{ steps.sparse.outputs.sparse_dirs }}"
          git sparse-checkout set \
            scripts .github toolchains build_defs libs/monorepo-tooling \
            ${{ steps.sparse.outputs.sparse_dirs }} 2>/dev/null

      - name: Compute affected targets
        id: affected
        run: |
          # PR: use merge-base; push: use HEAD~1
          if [ -n "${{ github.event.pull_request.base.sha }}" ] && [ -n "${{ github.event.pull_request.head.sha }}" ]; then
            BASE=$(git merge-base ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} 2>/dev/null || echo "${{ github.event.pull_request.base.sha }}")
            HEAD_REF=${{ github.event.pull_request.head.sha }}
          else
            BASE=HEAD~1
            HEAD_REF=HEAD
          fi
          echo "BASE ref: $BASE, HEAD ref: $HEAD_REF"
          eval "$(node libs/monorepo-tooling/dist/cli.js affected-targets "$BASE" "$HEAD_REF")"
          echo "Build  : ${BUILD_TARGETS:-<none>}"
          echo "Test   : ${TEST_TARGETS:-<none>}"
          echo "Quality: ${QUALITY_TARGETS:-<none>}"
          echo "Node   : $NEEDS_NODE"
          echo "Python : $NEEDS_PYTHON"
          echo "PHP    : $NEEDS_PHP"
          # Use delimiter format for values that may contain spaces (target lists)
          write_out() { echo "${1}<<EOF" >> $GITHUB_OUTPUT; echo -n "${!2}" >> $GITHUB_OUTPUT; echo "" >> $GITHUB_OUTPUT; echo "EOF" >> $GITHUB_OUTPUT; }
          write_out "build" BUILD_TARGETS
          write_out "test" TEST_TARGETS
          write_out "quality" QUALITY_TARGETS
          write_out "build_node" BUILD_NODE
          write_out "build_python" BUILD_PYTHON
          write_out "build_php" BUILD_PHP
          write_out "build_other" BUILD_OTHER
          write_out "test_node" TEST_NODE
          write_out "test_python" TEST_PYTHON
          write_out "test_php" TEST_PHP
          write_out "test_other" TEST_OTHER
          write_out "quality_node" QUALITY_NODE
          write_out "quality_python" QUALITY_PYTHON
          write_out "quality_php" QUALITY_PHP
          write_out "quality_other" QUALITY_OTHER
          echo "needs_node=$NEEDS_NODE" >> $GITHUB_OUTPUT
          echo "needs_python=$NEEDS_PYTHON" >> $GITHUB_OUTPUT
          echo "needs_php=$NEEDS_PHP" >> $GITHUB_OUTPUT

  build_node:
    uses: ./.github/workflows/affected-job.yml
    needs: compute
    if: needs.compute.outputs.build_node != ''
    with:
      job_name: build (node)
      job_type: build
      language: node
      sparse_dirs: ${{ needs.compute.outputs.sparse_dirs }}
      targets: ${{ needs.compute.outputs.build_node }}
      needs_node: ${{ needs.compute.outputs.needs_node }}
      needs_python: ${{ needs.compute.outputs.needs_python }}
      needs_php: ${{ needs.compute.outputs.needs_php }}

  build_python:
    uses: ./.github/workflows/affected-job.yml
    needs: compute
    if: needs.compute.outputs.build_python != ''
    with:
      job_name: build (python)
      job_type: build
      language: python
      sparse_dirs: ${{ needs.compute.outputs.sparse_dirs }}
      targets: ${{ needs.compute.outputs.build_python }}
      needs_node: ${{ needs.compute.outputs.needs_node }}
      needs_python: ${{ needs.compute.outputs.needs_python }}
      needs_php: ${{ needs.compute.outputs.needs_php }}

  php_toolchain_setup:
    name: php_toolchain_setup
    runs-on: ubuntu-latest
    needs: compute
    if: |
      always() &&
      needs.compute.result == 'success' &&
      (needs.compute.outputs.build_php != '' || needs.compute.outputs.test_php != '' || needs.compute.outputs.quality_php != '')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: blob:none
          sparse-checkout: |
            scripts
            .github
            toolchains
          sparse-checkout-cone-mode: true

      - name: Checkout BUCK files and third_party/php
        run: |
          git ls-tree -r --name-only HEAD \
            | grep -E '(^|/)BUCK$|\.bzl$|third_party/php/' \
            | while IFS= read -r f; do
                mkdir -p "$(dirname "$f")"
                git cat-file blob "HEAD:$f" > "$f"
                if [[ "$f" == *.sh ]]; then chmod +x "$f"; fi
              done

      - name: Expand sparse checkout for PHP toolchain
        run: |
          git sparse-checkout set scripts .github toolchains build_defs third_party/php ${{ needs.compute.outputs.sparse_dirs }} 2>/dev/null || true

      - name: Install Buck2
        run: |
          curl -fsSL \
            https://github.com/facebook/buck2/releases/download/latest/buck2-x86_64-unknown-linux-musl.zst \
            -o buck2.zst
          zstd -d buck2.zst && chmod +x buck2 && sudo mv buck2 /usr/local/bin/
          buck2 --version

      - name: Restore Buck2 PHP toolchain cache
        uses: actions/cache/restore@v4
        id: buck2-php-cache
        with:
          path: buck-out
          key: buck2-php-toolchain-v1-${{ hashFiles('third_party/php/BUCK') }}

      - name: Download PHP toolchain (Buck2)
        run: |
          echo "::group::Downloading PHP and Composer for Buck2 toolchain"
          echo "::notice::Fetching hermetic PHP 8.4.8 and composer.phar from static-php.dev and getcomposer.org..."
          buck2 build -v=3 root//third_party/php:php_archive root//third_party/php:composer_phar
          echo "::notice::PHP toolchain ready (buck-out)"
          echo "::endgroup::"

      - name: Save Buck2 PHP toolchain cache
        uses: actions/cache/save@v4
        if: steps.buck2-php-cache.outputs.cache-hit != 'true'
        with:
          path: buck-out
          key: buck2-php-toolchain-v1-${{ hashFiles('third_party/php/BUCK') }}

  build_php:
    uses: ./.github/workflows/affected-job.yml
    needs: [compute, php_toolchain_setup]
    if: needs.compute.outputs.build_php != ''
    with:
      job_name: build (php)
      job_type: build
      language: php
      sparse_dirs: ${{ needs.compute.outputs.sparse_dirs }}
      targets: ${{ needs.compute.outputs.build_php }}
      needs_node: ${{ needs.compute.outputs.needs_node }}
      needs_python: ${{ needs.compute.outputs.needs_python }}
      needs_php: ${{ needs.compute.outputs.needs_php }}

  build_other:
    uses: ./.github/workflows/affected-job.yml
    needs: compute
    if: needs.compute.outputs.build_other != ''
    with:
      job_name: build (other)
      job_type: build
      language: other
      sparse_dirs: ${{ needs.compute.outputs.sparse_dirs }}
      targets: ${{ needs.compute.outputs.build_other }}
      needs_node: ${{ needs.compute.outputs.needs_node }}
      needs_python: ${{ needs.compute.outputs.needs_python }}
      needs_php: ${{ needs.compute.outputs.needs_php }}

  test_node:
    uses: ./.github/workflows/affected-job.yml
    needs: compute
    if: needs.compute.outputs.test_node != ''
    with:
      job_name: test (node)
      job_type: test
      language: node
      sparse_dirs: ${{ needs.compute.outputs.sparse_dirs }}
      targets: ${{ needs.compute.outputs.test_node }}
      needs_node: ${{ needs.compute.outputs.needs_node }}
      needs_python: ${{ needs.compute.outputs.needs_python }}
      needs_php: ${{ needs.compute.outputs.needs_php }}

  test_python:
    uses: ./.github/workflows/affected-job.yml
    needs: compute
    if: needs.compute.outputs.test_python != ''
    with:
      job_name: test (python)
      job_type: test
      language: python
      sparse_dirs: ${{ needs.compute.outputs.sparse_dirs }}
      targets: ${{ needs.compute.outputs.test_python }}
      needs_node: ${{ needs.compute.outputs.needs_node }}
      needs_python: ${{ needs.compute.outputs.needs_python }}
      needs_php: ${{ needs.compute.outputs.needs_php }}

  test_php:
    uses: ./.github/workflows/affected-job.yml
    needs: [compute, php_toolchain_setup]
    if: needs.compute.outputs.test_php != ''
    with:
      job_name: test (php)
      job_type: test
      language: php
      sparse_dirs: ${{ needs.compute.outputs.sparse_dirs }}
      targets: ${{ needs.compute.outputs.test_php }}
      needs_node: ${{ needs.compute.outputs.needs_node }}
      needs_python: ${{ needs.compute.outputs.needs_python }}
      needs_php: ${{ needs.compute.outputs.needs_php }}

  test_other:
    uses: ./.github/workflows/affected-job.yml
    needs: compute
    if: needs.compute.outputs.test_other != ''
    with:
      job_name: test (other)
      job_type: test
      language: other
      sparse_dirs: ${{ needs.compute.outputs.sparse_dirs }}
      targets: ${{ needs.compute.outputs.test_other }}
      needs_node: ${{ needs.compute.outputs.needs_node }}
      needs_python: ${{ needs.compute.outputs.needs_python }}
      needs_php: ${{ needs.compute.outputs.needs_php }}

  quality_node:
    uses: ./.github/workflows/affected-job.yml
    needs: compute
    if: needs.compute.outputs.quality_node != ''
    with:
      job_name: quality (node)
      job_type: quality
      language: node
      sparse_dirs: ${{ needs.compute.outputs.sparse_dirs }}
      targets: ${{ needs.compute.outputs.quality_node }}
      needs_node: ${{ needs.compute.outputs.needs_node }}
      needs_python: ${{ needs.compute.outputs.needs_python }}
      needs_php: ${{ needs.compute.outputs.needs_php }}

  quality_python:
    uses: ./.github/workflows/affected-job.yml
    needs: compute
    if: needs.compute.outputs.quality_python != ''
    with:
      job_name: quality (python)
      job_type: quality
      language: python
      sparse_dirs: ${{ needs.compute.outputs.sparse_dirs }}
      targets: ${{ needs.compute.outputs.quality_python }}
      needs_node: ${{ needs.compute.outputs.needs_node }}
      needs_python: ${{ needs.compute.outputs.needs_python }}
      needs_php: ${{ needs.compute.outputs.needs_php }}

  quality_php:
    uses: ./.github/workflows/affected-job.yml
    needs: [compute, php_toolchain_setup]
    if: needs.compute.outputs.quality_php != ''
    with:
      job_name: quality (php)
      job_type: quality
      language: php
      sparse_dirs: ${{ needs.compute.outputs.sparse_dirs }}
      targets: ${{ needs.compute.outputs.quality_php }}
      needs_node: ${{ needs.compute.outputs.needs_node }}
      needs_python: ${{ needs.compute.outputs.needs_python }}
      needs_php: ${{ needs.compute.outputs.needs_php }}

  quality_other:
    uses: ./.github/workflows/affected-job.yml
    needs: compute
    if: needs.compute.outputs.quality_other != ''
    with:
      job_name: quality (other)
      job_type: quality
      language: other
      sparse_dirs: ${{ needs.compute.outputs.sparse_dirs }}
      targets: ${{ needs.compute.outputs.quality_other }}
      needs_node: ${{ needs.compute.outputs.needs_node }}
      needs_python: ${{ needs.compute.outputs.needs_python }}
      needs_php: ${{ needs.compute.outputs.needs_php }}

  gate:
    name: gate
    runs-on: ubuntu-latest
    needs:
      - compute
      - build_node
      - build_python
      - build_php
      - build_other
      - test_node
      - test_python
      - test_php
      - test_other
      - quality_node
      - quality_python
      - quality_php
      - quality_other
    if: always()
    steps:
      - name: Check all jobs passed or skipped
        run: |
          set -e
          if [ "${{ needs.compute.result }}" != "success" ]; then
            echo "::error::Compute job did not succeed (result: ${{ needs.compute.result }})"
            exit 1
          fi
          failed=""
          [ "${{ needs.build_node.result }}" = "failure" ]   && failed="${failed}build_node, " || true
          [ "${{ needs.build_python.result }}" = "failure" ]  && failed="${failed}build_python, " || true
          [ "${{ needs.build_php.result }}" = "failure" ]  && failed="${failed}build_php, " || true
          [ "${{ needs.build_other.result }}" = "failure" ]  && failed="${failed}build_other, " || true
          [ "${{ needs.test_node.result }}" = "failure" ]     && failed="${failed}test_node, " || true
          [ "${{ needs.test_python.result }}" = "failure" ]   && failed="${failed}test_python, " || true
          [ "${{ needs.test_php.result }}" = "failure" ]   && failed="${failed}test_php, " || true
          [ "${{ needs.test_other.result }}" = "failure" ]    && failed="${failed}test_other, " || true
          [ "${{ needs.quality_node.result }}" = "failure" ]  && failed="${failed}quality_node, " || true
          [ "${{ needs.quality_python.result }}" = "failure" ] && failed="${failed}quality_python, " || true
          [ "${{ needs.quality_php.result }}" = "failure" ]  && failed="${failed}quality_php, " || true
          [ "${{ needs.quality_other.result }}" = "failure" ] && failed="${failed}quality_other, " || true
          if [ -n "$failed" ]; then
            echo "::error::Failed jobs: ${failed%, }"
            exit 1
          fi
          echo "All jobs passed or were skipped (as expected)"