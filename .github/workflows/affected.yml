# PR: affected build/test/quality with blobless sparse checkout.
#
# Pipeline: compute (serial) → build_node | build_python | build_other | test_node | test_python | test_other | quality_node | quality_python | quality_other (parallel by language)
#
# Checkout strategy:
#   Phase 1  blobless clone + sparse cone (scripts/ .github/ toolchains/).
#            Then materialise ALL BUCK files — they are tiny config files,
#            not source code.  This gives buck2 a full view of the build
#            graph without downloading any language source blobs.
#   Phase 2  buck2 cquery rdeps(//..., ...) with the full graph to find
#            every package whose targets are transitively affected.
#            git sparse-checkout set expands the cone to those dirs only.
name: Affected CI
on:
  pull_request:
    branches: [main, master]
jobs:
  compute:
    name: compute
    runs-on: ubuntu-latest
    outputs:
      sparse_dirs: ${{ steps.sparse.outputs.sparse_dirs }}
      build: ${{ steps.affected.outputs.build }}
      test: ${{ steps.affected.outputs.test }}
      quality: ${{ steps.affected.outputs.quality }}
      build_node: ${{ steps.affected.outputs.build_node }}
      build_python: ${{ steps.affected.outputs.build_python }}
      build_other: ${{ steps.affected.outputs.build_other }}
      test_node: ${{ steps.affected.outputs.test_node }}
      test_python: ${{ steps.affected.outputs.test_python }}
      test_other: ${{ steps.affected.outputs.test_other }}
      quality_node: ${{ steps.affected.outputs.quality_node }}
      quality_python: ${{ steps.affected.outputs.quality_python }}
      quality_other: ${{ steps.affected.outputs.quality_other }}
      needs_node: ${{ steps.affected.outputs.needs_node }}
      needs_python: ${{ steps.affected.outputs.needs_python }}
    steps:
      # ── Phase 1: blobless partial clone ───────────────────────────────────────
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: blob:none
          sparse-checkout: |
            scripts
            .github
            toolchains
          sparse-checkout-cone-mode: true

      # ── Materialise BUCK files, build_defs (.bzl), sh_test scripts ─────────────
      # Also tsconfig*.json and eslint.config.js — required by ts_project genrules
      # (e.g. tsc -p tsconfig.build.json runs in package dir).
      - name: Checkout BUCK files, sh_test scripts, and package manifests
        run: |
          git ls-tree -r --name-only HEAD \
            | grep -E '(^|/)BUCK$|\.bzl$|\.sh$|(^|/)package\.json$|pnpm-workspace\.yaml$|pnpm-lock\.yaml$|tsconfig\.build\.json$|tsconfig\.json$|eslint\.config\.(js|mjs|cjs)$' \
            | while IFS= read -r f; do
                mkdir -p "$(dirname "$f")"
                git cat-file blob "HEAD:$f" > "$f"
                if [[ "$f" == *.sh ]]; then chmod +x "$f"; fi
              done
          echo "BUCK files    : $(find . -name BUCK          -not -path './.git/*' | wc -l)"
          echo "Starlark (.bzl): $(find . -name '*.bzl'       -not -path './.git/*' | wc -l)"
          echo "Shell scripts : $(find . -name '*.sh'        -not -path './.git/*' | wc -l)"
          echo "package.json  : $(find . -name 'package.json' -not -path './.git/*' -not -path '*/node_modules/*' | wc -l)"

      - name: Install Buck2
        run: |
          curl -fsSL \
            https://github.com/facebook/buck2/releases/download/latest/buck2-x86_64-unknown-linux-musl.zst \
            -o buck2.zst
          zstd -d buck2.zst && chmod +x buck2 && sudo mv buck2 /usr/local/bin/
          buck2 --version

      - name: Compute sparse dirs
        id: sparse
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          [ -z "$BASE" ] && BASE=HEAD~1
          eval "$(bash scripts/compute_sparse_dirs.sh "$BASE")"
          echo "Sparse dirs: ${SPARSE_DIRS:-<none>}"
          echo "sparse_dirs=$SPARSE_DIRS" >> $GITHUB_OUTPUT

      - name: Expand sparse checkout
        if: steps.sparse.outputs.sparse_dirs != ''
        run: |
          echo "Checking out: ${{ steps.sparse.outputs.sparse_dirs }}"
          git sparse-checkout set \
            scripts .github toolchains \
            ${{ steps.sparse.outputs.sparse_dirs }} 2>/dev/null

      - name: Compute affected targets
        id: affected
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          [ -z "$BASE" ] && BASE=HEAD~1
          eval "$(bash scripts/affected_targets.sh "$BASE")"
          echo "Build  : ${BUILD_TARGETS:-<none>}"
          echo "Test   : ${TEST_TARGETS:-<none>}"
          echo "Quality: ${QUALITY_TARGETS:-<none>}"
          echo "Node   : $NEEDS_NODE"
          echo "Python : $NEEDS_PYTHON"
          echo "build=$BUILD_TARGETS"     >> $GITHUB_OUTPUT
          echo "test=$TEST_TARGETS"       >> $GITHUB_OUTPUT
          echo "quality=$QUALITY_TARGETS" >> $GITHUB_OUTPUT
          echo "build_node=$BUILD_NODE"   >> $GITHUB_OUTPUT
          echo "build_python=$BUILD_PYTHON" >> $GITHUB_OUTPUT
          echo "build_other=$BUILD_OTHER" >> $GITHUB_OUTPUT
          echo "test_node=$TEST_NODE"     >> $GITHUB_OUTPUT
          echo "test_python=$TEST_PYTHON" >> $GITHUB_OUTPUT
          echo "test_other=$TEST_OTHER"   >> $GITHUB_OUTPUT
          echo "quality_node=$QUALITY_NODE" >> $GITHUB_OUTPUT
          echo "quality_python=$QUALITY_PYTHON" >> $GITHUB_OUTPUT
          echo "quality_other=$QUALITY_OTHER" >> $GITHUB_OUTPUT
          echo "needs_node=$NEEDS_NODE"   >> $GITHUB_OUTPUT
          echo "needs_python=$NEEDS_PYTHON" >> $GITHUB_OUTPUT

  build_node:
    name: build (node)
    runs-on: ubuntu-latest
    needs: compute
    if: needs.compute.outputs.build_node != ''
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: blob:none
          sparse-checkout: |
