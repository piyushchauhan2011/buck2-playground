# PR: affected build/test/quality with blobless sparse checkout.
#
# Checkout strategy:
#   Phase 1  blobless clone + sparse cone (scripts/ .github/ toolchains/).
#            Then materialise ALL BUCK files — they are tiny config files,
#            not source code.  This gives buck2 a full view of the build
#            graph without downloading any language source blobs.
#   Phase 2  buck2 cquery rdeps(//..., ...) with the full graph to find
#            every package whose targets are transitively affected.
#            git sparse-checkout set expands the cone to those dirs only.
name: Affected CI
on:
  pull_request:
    branches: [main, master]
jobs:
  affected:
    runs-on: ubuntu-latest
    steps:
      # ── Phase 1: blobless partial clone ───────────────────────────────────────
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: blob:none
          sparse-checkout: |
            scripts
            .github
            toolchains
          sparse-checkout-cone-mode: true

      # ── Materialise BUCK files and sh_test runner scripts ─────────────────────
      # BUCK files are plain-text Starlark config (< 5 KB each).
      # Shell scripts (*.sh) are required because sh_test(test = "script.sh")
      # validates the test attribute via attrs.source() at package LOAD time —
      # even during uquery.  Without the script on disk, the package fails to
      # load and uquery rdeps() cannot traverse into it.
      #
      # We use git cat-file blob HEAD:path > path (not git checkout HEAD -- path)
      # because checkout only works for files already in the sparse index.
      # cat-file reads blobs directly from the object store — works for any path.
      # Also materialise package.json and pnpm workspace files so that
      # `pnpm install --frozen-lockfile` (run after Phase 2) can resolve the
      # full workspace graph even when only a subset of package dirs are in
      # the sparse cone.  These files are tiny config — not source blobs.
      - name: Checkout BUCK files, sh_test scripts, and package manifests
        run: |
          git ls-tree -r --name-only HEAD \
            | grep -E '(^|/)BUCK$|\.sh$|(^|/)package\.json$|pnpm-workspace\.yaml$|pnpm-lock\.yaml$' \
            | while IFS= read -r f; do
                mkdir -p "$(dirname "$f")"
                git cat-file blob "HEAD:$f" > "$f"
                # git cat-file drops the execute bit; restore it for shell scripts.
                # Use `if` not `[[ ]] &&` — with set -e, a false [[ ]] exits the loop.
                if [[ "$f" == *.sh ]]; then chmod +x "$f"; fi
              done
          echo "BUCK files    : $(find . -name BUCK          -not -path './.git/*' | wc -l)"
          echo "Shell scripts : $(find . -name '*.sh'        -not -path './.git/*' | wc -l)"
          echo "package.json  : $(find . -name 'package.json' -not -path './.git/*' -not -path '*/node_modules/*' | wc -l)"

      # ── Install Buck2 (needed by compute_sparse_dirs.sh for cquery) ───────────
      - name: Install Buck2
        run: |
          curl -fsSL \
            https://github.com/facebook/buck2/releases/download/latest/buck2-x86_64-unknown-linux-musl.zst \
            -o buck2.zst
          zstd -d buck2.zst && chmod +x buck2 && sudo mv buck2 /usr/local/bin/
          buck2 --version

      # ── Compute sparse dirs via uquery (full build-graph view) ────────────────
      # compute_sparse_dirs.sh runs buck2 uquery kind() + rdeps(//..., ...)
      # uquery reads only dependency edges (no source file validation), so it
      # correctly traverses the graph even though source files are absent.
      # //... covers the whole repo because all BUCK files are now on disk.
      - name: Compute sparse dirs
        id: sparse
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          [ -z "$BASE" ] && BASE=HEAD~1
          eval "$(bash scripts/compute_sparse_dirs.sh "$BASE")"
          echo "Sparse dirs: ${SPARSE_DIRS:-<none>}"
          echo "sparse_dirs=$SPARSE_DIRS" >> $GITHUB_OUTPUT

      # ── Phase 2: expand sparse checkout to affected source dirs ───────────────
      # Use `set` (not `add`) so the final cone is exactly:
      #   always-needed dirs + affected package dirs
      # BUCK files in non-affected packages are removed here — that's fine
      # because the global cquery in the previous step already ran.
      - name: Expand sparse checkout
        if: steps.sparse.outputs.sparse_dirs != ''
        run: |
          echo "Checking out: ${{ steps.sparse.outputs.sparse_dirs }}"
          # 2>/dev/null suppresses "paths not up to date" warnings for BUCK
          # files we placed outside the cone via git cat-file.  The files stay
          # on disk regardless — git only warns, it does not delete them.
          git sparse-checkout set \
            scripts .github toolchains \
            ${{ steps.sparse.outputs.sparse_dirs }} 2>/dev/null

      # ── Compute affected targets (classify into build/test/quality) ────────────
      # Also detects toolchain needs FROM THE FILESYSTEM here (after Phase 2
      # has expanded the sparse cone, so source files are on disk).
      # This is more reliable than Phase-1 detection: Phase 1 only has BUCK
      # files, so it can miss packages that become affected via rdeps but do
      # not themselves reference libs/common.
      - name: Compute affected targets
        id: affected
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          [ -z "$BASE" ] && BASE=HEAD~1
          eval "$(bash scripts/affected_targets.sh "$BASE")"
          echo "Build  : ${BUILD_TARGETS:-<none>}"
          echo "Test   : ${TEST_TARGETS:-<none>}"
          echo "Quality: ${QUALITY_TARGETS:-<none>}"
          echo "Node   : $NEEDS_NODE"
          echo "Python : $NEEDS_PYTHON"
          echo "build=$BUILD_TARGETS"     >> $GITHUB_OUTPUT
          echo "test=$TEST_TARGETS"       >> $GITHUB_OUTPUT
          echo "quality=$QUALITY_TARGETS" >> $GITHUB_OUTPUT
          echo "needs_node=$NEEDS_NODE"   >> $GITHUB_OUTPUT
          echo "needs_python=$NEEDS_PYTHON" >> $GITHUB_OUTPUT

      # ── Install only the toolchains that are needed ───────────────────────────
      # Use steps.affected (Phase 2, filesystem check) not steps.sparse (Phase 1,
      # git cat-file) — Phase 2 is the authoritative source because source files
      # are on disk by this point.
      - uses: pnpm/action-setup@v4
        if: steps.affected.outputs.needs_node == 'true'
      - uses: actions/setup-node@v4
        if: steps.affected.outputs.needs_node == 'true'
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install JS dependencies
        if: steps.affected.outputs.needs_node == 'true'
        run: pnpm install --frozen-lockfile

      - uses: actions/setup-python@v5
        if: steps.affected.outputs.needs_python == 'true'
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: domains/api/python/requirements-dev.txt
      - name: Install Python dependencies
        if: steps.affected.outputs.needs_python == 'true'
        run: pip install -q -r domains/api/python/requirements-dev.txt

      # ── Restart Buck2 daemon so it picks up the updated PATH ─────────────────
      # The daemon was first started during `compute_sparse_dirs.sh` (uquery).
      # It captured the environment *before* actions/setup-node and
      # actions/setup-python added their bin dirs to PATH.  Genrules inherit
      # the daemon's environment, so they would use /usr/bin/python (no ruff,
      # no mypy, etc.) instead of the managed Python.
      # `buck2 kill` shuts down the daemon; the next buck2 command starts a
      # fresh one that inherits the current PATH with all toolchains present.
      - name: Restart Buck2 daemon with updated PATH
        run: buck2 kill || true

      # ── Run affected work ─────────────────────────────────────────────────────
      - name: Build affected
        if: steps.affected.outputs.build != ''
        run: buck2 build ${{ steps.affected.outputs.build }}
      - name: Test affected
        if: steps.affected.outputs.test != ''
        run: buck2 test ${{ steps.affected.outputs.test }}
      - name: Quality checks
        if: steps.affected.outputs.quality != ''
        run: buck2 build ${{ steps.affected.outputs.quality }}
