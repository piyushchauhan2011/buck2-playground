            | grep -E '(^|/)BUCK$|\.bzl$|\.sh$|(^|/)package\.json$|pnpm-workspace\.yaml$|pnpm-lock\.yaml$|tsconfig\.build\.json$|tsconfig\.json$|eslint\.config\.(js|mjs|cjs)$' \
            | while IFS= read -r f; do
                mkdir -p "$(dirname "$f")"
                git cat-file blob "HEAD:$f" > "$f"
                if [[ "$f" == *.sh ]]; then chmod +x "$f"; fi
              done

      - name: Install Buck2
        run: |
          curl -fsSL \
            https://github.com/facebook/buck2/releases/download/latest/buck2-x86_64-unknown-linux-musl.zst \
            -o buck2.zst
          zstd -d buck2.zst && chmod +x buck2 && sudo mv buck2 /usr/local/bin/
          buck2 --version

      - name: Expand sparse checkout
        run: |
          git sparse-checkout set scripts .github toolchains ${{ needs.compute.outputs.sparse_dirs }} 2>/dev/null || true

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Restart Buck2 daemon with updated PATH
        run: buck2 kill || true

      - name: Build affected (node)
        run: buck2 build ${{ needs.compute.outputs.build_node }}

  build_python:
    name: build (python)
