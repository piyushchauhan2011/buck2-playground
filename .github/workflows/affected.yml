# PR: affected build/test/quality with blobless sparse checkout.
#
# Pipeline: compute (serial) → build | test | quality (parallel)
#
# Checkout strategy:
#   Phase 1  blobless clone + sparse cone (scripts/ .github/ toolchains/).
#            Then materialise ALL BUCK files — they are tiny config files,
#            not source code.  This gives buck2 a full view of the build
#            graph without downloading any language source blobs.
#   Phase 2  buck2 cquery rdeps(//..., ...) with the full graph to find
#            every package whose targets are transitively affected.
#            git sparse-checkout set expands the cone to those dirs only.
name: Affected CI
on:
  pull_request:
    branches: [main, master]
jobs:
  compute:
    name: compute
    runs-on: ubuntu-latest
    outputs:
      sparse_dirs: ${{ steps.sparse.outputs.sparse_dirs }}
      build: ${{ steps.affected.outputs.build }}
      test: ${{ steps.affected.outputs.test }}
      quality: ${{ steps.affected.outputs.quality }}
      needs_node: ${{ steps.affected.outputs.needs_node }}
      needs_python: ${{ steps.affected.outputs.needs_python }}
    steps:
      # ── Phase 1: blobless partial clone ───────────────────────────────────────
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: blob:none
          sparse-checkout: |
            scripts
            .github
            toolchains
          sparse-checkout-cone-mode: true

      # ── Materialise BUCK files, build_defs (.bzl), sh_test scripts ─────────────
      - name: Checkout BUCK files, sh_test scripts, and package manifests
        run: |
          git ls-tree -r --name-only HEAD \
            | grep -E '(^|/)BUCK$|\.bzl$|\.sh$|(^|/)package\.json$|pnpm-workspace\.yaml$|pnpm-lock\.yaml$' \
            | while IFS= read -r f; do
                mkdir -p "$(dirname "$f")"
                git cat-file blob "HEAD:$f" > "$f"
                if [[ "$f" == *.sh ]]; then chmod +x "$f"; fi
              done
          echo "BUCK files    : $(find . -name BUCK          -not -path './.git/*' | wc -l)"
          echo "Starlark (.bzl): $(find . -name '*.bzl'       -not -path './.git/*' | wc -l)"
          echo "Shell scripts : $(find . -name '*.sh'        -not -path './.git/*' | wc -l)"
          echo "package.json  : $(find . -name 'package.json' -not -path './.git/*' -not -path '*/node_modules/*' | wc -l)"

      - name: Install Buck2
        run: |
          curl -fsSL \
            https://github.com/facebook/buck2/releases/download/latest/buck2-x86_64-unknown-linux-musl.zst \
            -o buck2.zst
          zstd -d buck2.zst && chmod +x buck2 && sudo mv buck2 /usr/local/bin/
          buck2 --version

      - name: Compute sparse dirs
        id: sparse
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          [ -z "$BASE" ] && BASE=HEAD~1
          eval "$(bash scripts/compute_sparse_dirs.sh "$BASE")"
          echo "Sparse dirs: ${SPARSE_DIRS:-<none>}"
          echo "sparse_dirs=$SPARSE_DIRS" >> $GITHUB_OUTPUT

      - name: Expand sparse checkout
        if: steps.sparse.outputs.sparse_dirs != ''
        run: |
          echo "Checking out: ${{ steps.sparse.outputs.sparse_dirs }}"
          git sparse-checkout set \
            scripts .github toolchains \
            ${{ steps.sparse.outputs.sparse_dirs }} 2>/dev/null

      - name: Compute affected targets
        id: affected
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          [ -z "$BASE" ] && BASE=HEAD~1
          eval "$(bash scripts/affected_targets.sh "$BASE")"
          echo "Build  : ${BUILD_TARGETS:-<none>}"
          echo "Test   : ${TEST_TARGETS:-<none>}"
          echo "Quality: ${QUALITY_TARGETS:-<none>}"
          echo "Node   : $NEEDS_NODE"
          echo "Python : $NEEDS_PYTHON"
          echo "build=$BUILD_TARGETS"     >> $GITHUB_OUTPUT
          echo "test=$TEST_TARGETS"       >> $GITHUB_OUTPUT
          echo "quality=$QUALITY_TARGETS" >> $GITHUB_OUTPUT
          echo "needs_node=$NEEDS_NODE"   >> $GITHUB_OUTPUT
          echo "needs_python=$NEEDS_PYTHON" >> $GITHUB_OUTPUT

  build:
    name: build
    runs-on: ubuntu-latest
    needs: compute
    if: needs.compute.outputs.build != ''
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: blob:none
          sparse-checkout: |
            scripts
            .github
            toolchains
          sparse-checkout-cone-mode: true

      - name: Checkout BUCK files, sh_test scripts, and package manifests
        run: |
          git ls-tree -r --name-only HEAD \
            | grep -E '(^|/)BUCK$|\.bzl$|\.sh$|(^|/)package\.json$|pnpm-workspace\.yaml$|pnpm-lock\.yaml$' \
            | while IFS= read -r f; do
                mkdir -p "$(dirname "$f")"
                git cat-file blob "HEAD:$f" > "$f"
                if [[ "$f" == *.sh ]]; then chmod +x "$f"; fi
              done

      - name: Install Buck2
        run: |
          curl -fsSL \
            https://github.com/facebook/buck2/releases/download/latest/buck2-x86_64-unknown-linux-musl.zst \
            -o buck2.zst
          zstd -d buck2.zst && chmod +x buck2 && sudo mv buck2 /usr/local/bin/
          buck2 --version

      - name: Expand sparse checkout
        run: |
          git sparse-checkout set scripts .github toolchains ${{ needs.compute.outputs.sparse_dirs }} 2>/dev/null || true

      - uses: pnpm/action-setup@v4
        if: needs.compute.outputs.needs_node == 'true'
      - uses: actions/setup-node@v4
        if: needs.compute.outputs.needs_node == 'true'
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install JS dependencies
        if: needs.compute.outputs.needs_node == 'true'
        run: pnpm install --frozen-lockfile

      - uses: actions/setup-python@v5
        if: needs.compute.outputs.needs_python == 'true'
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: domains/api/python/requirements-dev.txt
      - name: Install Python dependencies
        if: needs.compute.outputs.needs_python == 'true'
        run: pip install -q -r domains/api/python/requirements-dev.txt

      - name: Restart Buck2 daemon with updated PATH
        run: buck2 kill || true

      - name: Build affected
        run: buck2 build ${{ needs.compute.outputs.build }}

  test:
    name: test
    runs-on: ubuntu-latest
    needs: compute
    if: needs.compute.outputs.test != ''
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: blob:none
          sparse-checkout: |
            scripts
            .github
            toolchains
          sparse-checkout-cone-mode: true

      - name: Checkout BUCK files, sh_test scripts, and package manifests
        run: |
          git ls-tree -r --name-only HEAD \
            | grep -E '(^|/)BUCK$|\.bzl$|\.sh$|(^|/)package\.json$|pnpm-workspace\.yaml$|pnpm-lock\.yaml$' \
            | while IFS= read -r f; do
                mkdir -p "$(dirname "$f")"
                git cat-file blob "HEAD:$f" > "$f"
                if [[ "$f" == *.sh ]]; then chmod +x "$f"; fi
              done

      - name: Install Buck2
        run: |
          curl -fsSL \
            https://github.com/facebook/buck2/releases/download/latest/buck2-x86_64-unknown-linux-musl.zst \
            -o buck2.zst
          zstd -d buck2.zst && chmod +x buck2 && sudo mv buck2 /usr/local/bin/
          buck2 --version

      - name: Expand sparse checkout
        run: |
          git sparse-checkout set scripts .github toolchains ${{ needs.compute.outputs.sparse_dirs }} 2>/dev/null || true

      - uses: pnpm/action-setup@v4
        if: needs.compute.outputs.needs_node == 'true'
      - uses: actions/setup-node@v4
        if: needs.compute.outputs.needs_node == 'true'
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install JS dependencies
        if: needs.compute.outputs.needs_node == 'true'
        run: pnpm install --frozen-lockfile

      - uses: actions/setup-python@v5
        if: needs.compute.outputs.needs_python == 'true'
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: domains/api/python/requirements-dev.txt
      - name: Install Python dependencies
        if: needs.compute.outputs.needs_python == 'true'
        run: pip install -q -r domains/api/python/requirements-dev.txt

      - name: Restart Buck2 daemon with updated PATH
        run: buck2 kill || true

      - name: Test affected
        run: buck2 test ${{ needs.compute.outputs.test }}

  quality:
    name: quality
    runs-on: ubuntu-latest
    needs: compute
    if: needs.compute.outputs.quality != ''
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: blob:none
          sparse-checkout: |
            scripts
            .github
            toolchains
          sparse-checkout-cone-mode: true

      - name: Checkout BUCK files, sh_test scripts, and package manifests
        run: |
          git ls-tree -r --name-only HEAD \
            | grep -E '(^|/)BUCK$|\.bzl$|\.sh$|(^|/)package\.json$|pnpm-workspace\.yaml$|pnpm-lock\.yaml$' \
            | while IFS= read -r f; do
                mkdir -p "$(dirname "$f")"
                git cat-file blob "HEAD:$f" > "$f"
                if [[ "$f" == *.sh ]]; then chmod +x "$f"; fi
              done

      - name: Install Buck2
        run: |
          curl -fsSL \
            https://github.com/facebook/buck2/releases/download/latest/buck2-x86_64-unknown-linux-musl.zst \
            -o buck2.zst
          zstd -d buck2.zst && chmod +x buck2 && sudo mv buck2 /usr/local/bin/
          buck2 --version

      - name: Expand sparse checkout
        run: |
          git sparse-checkout set scripts .github toolchains ${{ needs.compute.outputs.sparse_dirs }} 2>/dev/null || true

      - uses: pnpm/action-setup@v4
        if: needs.compute.outputs.needs_node == 'true'
      - uses: actions/setup-node@v4
        if: needs.compute.outputs.needs_node == 'true'
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install JS dependencies
        if: needs.compute.outputs.needs_node == 'true'
        run: pnpm install --frozen-lockfile

      - uses: actions/setup-python@v5
        if: needs.compute.outputs.needs_python == 'true'
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: domains/api/python/requirements-dev.txt
      - name: Install Python dependencies
        if: needs.compute.outputs.needs_python == 'true'
        run: pip install -q -r domains/api/python/requirements-dev.txt

      - name: Restart Buck2 daemon with updated PATH
        run: buck2 kill || true

      - name: Quality checks
        run: buck2 build ${{ needs.compute.outputs.quality }}
